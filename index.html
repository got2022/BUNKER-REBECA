
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunker Gramatical - Rebeca Andrade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-30px) rotate(15deg); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .bunker-gradient { background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); }
        .text-neon { text-shadow: 0 0 15px rgba(129, 140, 248, 0.6); }
    </style>
</head>
<body class="bunker-gradient text-slate-100 overflow-x-hidden selection:bg-indigo-500">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useCallback } = React;

        // Ícones manuais para garantir que o código nunca dê "ReferenceError"
        const Icons = {
            Trophy: () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>,
            Lock: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Refresh: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>,
            Star: () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="currentColor" className="text-yellow-400"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        };

        const grammarClasses = [
            { 
                id: 'Sub', name: 'Substantivo', cat: 'Variável', color: 'from-blue-600 to-indigo-800', 
                desc: 'O solo da ginástica! Nomeia os elementos da notícia: a atleta, a medalha e o pódio.', 
                flex: 'Muda de forma! Varia em género (O ginasta / A ginasta) e número (Medalha / Medalhas).', 
                tip: "Procure pelos 'nomes' dos objetos na notícia da Rebeca.", 
                examples: ['Rebeca', 'Salto', 'Ouro'], note: 523.25, noteName: 'Dó' 
            },
            { 
                id: 'Ver', name: 'Verbo', cat: 'Variável', color: 'from-violet-600 to-purple-900', 
                desc: 'A ação do movimento! É o girar, saltar e vencer que deu a vitória à Rebeca.', 
                flex: 'Muda de forma! Ajusta-se ao tempo (Ela venceu / Ela vencerá) e à pessoa.', 
                tip: 'É o motor da notícia! Representa a dinâmica da coreografia.', 
                examples: ['Saltar', 'Conquistar', 'Vencer'], note: 587.33, noteName: 'Ré' 
            },
            { 
                id: 'Adj', name: 'Adjetivo', cat: 'Variável', color: 'from-cyan-500 to-blue-700', 
                desc: 'O brilho do collant! Caracteriza a performance incrível da nossa ginasta.', 
                flex: 'Muda para combinar com o nome (Atleta forte / Atletas fortes).', 
                tip: 'Dá qualidade: Como foi o salto? Dourado!', 
                examples: ['Dourada', 'Impecável', 'Forte'], note: 659.25, noteName: 'Mi' 
            },
            { 
                id: 'Pro', name: 'Pronome', cat: 'Variável', color: 'from-fuchsia-600 to-pink-800', 
                desc: 'O reserva tático! Substitui o nome "Rebeca" para o texto não ficar repetitivo.', 
                flex: 'Muda conforme quem fala (Eu venci / Ela venceu).', 
                tip: 'Ajuda na coesão: "Ela conquistou o mundo".', 
                examples: ['Ela', 'Minha', 'Nossa'], note: 698.46, noteName: 'Fá' 
            },
            { 
                id: 'Art', name: 'Artigo', cat: 'Variável', color: 'from-sky-500 to-blue-600', 
                desc: 'O batedor de entrada! Define se é UMA medalha qualquer ou A medalha de ouro.', 
                flex: 'Sempre concorda com o substantivo (O pódio / As traves).', 
                tip: 'Aparece antes dos nomes para definir o destaque.', 
                examples: ['A', 'Um', 'As'], note: 783.99, noteName: 'Sol' 
            },
            { 
                id: 'Num', name: 'Numeral', cat: 'Variável', color: 'from-teal-500 to-emerald-700', 
                desc: 'O placar olímpico! Indica a posição no pódio ou a quantidade de ouros.', 
                flex: 'Alguns mudam de forma (Um / Uma), outros são fixos.', 
                tip: 'Responde: Quantas medalhas? Qual lugar?', 
                examples: ['Primeiro', 'Duas', 'Dobro'], note: 880.00, noteName: 'Lá' 
            },
            { 
                id: 'Adv', name: 'Advérbio', cat: 'Invariável', color: 'from-orange-600 to-yellow-700', 
                desc: 'O sinal do técnico! Diz como ou quando o salto da Rebeca ocorreu.', 
                flex: 'Não muda de forma! É a estabilidade total da aterrissagem.', 
                tip: 'Dá circunstância: Saltou MUITO? Venceu ONTEM?', 
                examples: ['Muito', 'Ontem', 'Bem'], note: 987.77, noteName: 'Si' 
            },
            { 
                id: 'Pre', name: 'Preposição', cat: 'Invariável', color: 'from-amber-600 to-orange-800', 
                desc: 'A liga da trave! Une as palavras da notícia sem nunca quebrar.', 
                flex: 'Não muda nunca. É a ponte entre os termos.', 
                tip: 'Exemplo: Medalha DE ouro. Liga os nomes.', 
                examples: ['De', 'Com', 'Para'], note: 1046.50, noteName: 'Dó+' 
            },
            { 
                id: 'Con', name: 'Conjunção', cat: 'Invariável', color: 'from-red-600 to-rose-800', 
                desc: 'O gancho rítmico! Une frases para a coreografia do texto ter sentido.', 
                flex: 'Funciona como um conector fixo entre os pensamentos.', 
                tip: 'Rebeca saltou E venceu. O "E" une as ideias.', 
                examples: ['E', 'Mas', 'Porque'], note: 1174.66, noteName: 'Ré+' 
            },
            { 
                id: 'Int', name: 'Interjeição', cat: 'Invariável', color: 'from-pink-600 to-red-800', 
                desc: 'O grito da torcida! Expressa a emoção súbita da nota 10.', 
                flex: 'Sempre igual. É pura emoção condensada num som.', 
                tip: 'Quase sempre acompanhada por ponto de exclamação (!).', 
                examples: ['Uau!', 'Viva!', 'Bravo!'], note: 1318.51, noteName: 'Mi+' 
            }
        ];

        const BackgroundIcons = () => {
            const elements = [
                { emoji: '🍭', top: '5%', left: '8%', color: '#ec4899' },
                { emoji: '📱', top: '15%', left: '88%', color: '#94a3b8' },
                { emoji: '📓', top: '45%', left: '4%', color: '#3b82f6' },
                { emoji: '⚽', top: '85%', left: '92%', color: '#f8fafc' },
                { emoji: '🍦', top: '65%', left: '85%', color: '#fbbf24' },
                { emoji: '🌭', top: '80%', left: '40%', color: '#ea580c' },
                { emoji: '🧸', top: '22%', left: '15%', color: '#d97706' },
                { emoji: '🧁', top: '10%', left: '45%', color: '#a855f7' },
                { emoji: '🍩', top: '55%', left: '90%', color: '#f472b6' },
                { emoji: '🛹', top: '10%', left: '25%', color: '#22c55e' }
            ];
            return (
                <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
                    {elements.map((item, idx) => (
                        <span key={idx} className="absolute text-5xl md:text-7xl animate-float drop-shadow-2xl opacity-80" 
                              style={{ top: item.top, left: item.left, color: item.color, animationDelay: `${idx * 0.5}s` }}>
                            {item.emoji}
                        </span>
                    ))}
                </div>
            );
        };

        function App() {
            const [selected, setSelected] = useState(null);

            const playMusicalNote = (frequency) => {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 1.2);
            };

            return (
                <div className="min-h-screen p-4 md:p-10 relative">
                    <BackgroundIcons />
                    <div className="max-w-6xl mx-auto relative z-10">
                        <header className="mb-10 text-center bg-slate-900/90 backdrop-blur-2xl p-8 rounded-[3rem] shadow-[0_0_50px_rgba(79,70,229,0.4)] border-4 border-indigo-500/30 relative">
                            <div className="inline-flex items-center gap-6 mb-4">
                                <div className="bg-gradient-to-br from-yellow-400 to-amber-600 p-4 rounded-2xl shadow-lg border-2 border-white/20 text-white">
                                    <Icons.Trophy />
                                </div>
                                <div className="text-left">
                                    <h1 className="text-4xl md:text-6xl font-black tracking-tighter uppercase leading-none text-white text-neon">
                                        BUNKER <span className="text-indigo-400">REBECA</span>
                                    </h1>
                                    <p className="mt-2 text-slate-400 text-xs font-bold uppercase tracking-widest">Missão Olímpica: Domínio Morfológico</p>
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                            <div className="lg:col-span-7 bg-slate-900/90 p-8 rounded-[3rem] shadow-2xl border-2 border-indigo-500/20">
                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                                    {grammarClasses.map((cls) => (
                                        <button key={cls.id} 
                                                onClick={() => { setSelected(cls); playMusicalNote(cls.note); }} 
                                                className={`relative aspect-square flex flex-col items-center justify-center rounded-2xl transition-all duration-300 bg-gradient-to-br ${cls.color} ${selected?.id === cls.id ? 'ring-4 ring-white scale-105 shadow-[0_0_30px_rgba(255,255,255,0.3)] z-10' : 'opacity-90 hover:scale-110 shadow-xl'}`}>
                                            <span className="text-[10px] font-black opacity-40 absolute top-2 left-3 text-white">{cls.id}</span>
                                            <span className="text-[14px] font-black uppercase text-center leading-tight px-1 text-white">{cls.name}</span>
                                            <div className="mt-2 text-[8px] font-black px-2 py-0.5 rounded-full uppercase bg-black/30 border border-white/10 text-white leading-none">{cls.cat}</div>
                                        </button>
                                    ))}
                                </div>
                                <div className="mt-8 flex flex-col md:flex-row gap-4 justify-center">
                                    <div className="flex items-center gap-2 bg-blue-600/20 text-blue-400 px-4 py-2 rounded-xl border border-blue-500/40 text-[10px] font-black uppercase">
                                        <Icons.Refresh /> Variáveis: ELAS MUDAM!
                                    </div>
                                    <div className="flex items-center gap-2 bg-orange-600/20 text-orange-400 px-4 py-2 rounded-xl border border-orange-500/40 text-[10px] font-black uppercase">
                                        <Icons.Lock /> Invariáveis: NÃO MUDAM!
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-5">
                                {selected ? (
                                    <div className="bg-slate-900 rounded-[3rem] shadow-[0_0_80px_rgba(0,0,0,0.6)] border-4 border-indigo-500/20 overflow-hidden sticky top-8 animate-in zoom-in-95 duration-500">
                                        <div className={`bg-gradient-to-br ${selected.color} p-10 text-white relative border-b-4 border-black/20`}>
                                            <div className="absolute top-4 right-4 text-[10px] font-black bg-black/20 px-3 py-1 rounded-full border border-white/20 uppercase tracking-tighter">
                                                Escala: {selected.noteName}
                                            </div>
                                            <h2 className="text-5xl font-black uppercase leading-none">{selected.name}</h2>
                                            <p className="mt-4 text-xs font-black uppercase tracking-widest bg-black/30 inline-block px-3 py-1 rounded-lg">Status: {selected.cat}</p>
                                        </div>
                                        <div className="p-8 space-y-6 bg-slate-900">
                                            <section>
                                                <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 border-b border-slate-800 pb-1">Conexão com a Notícia</h4>
                                                <p className="text-slate-100 font-bold text-xl leading-tight">{selected.desc}</p>
                                            </section>
                                            <section className={`p-4 rounded-xl border-l-8 bg-black/20 ${selected.cat === 'Variável' ? 'border-blue-600 shadow-[0_0_20px_rgba(37,99,235,0.2)]' : 'border-orange-500 shadow-[0_0_20px_rgba(249,115,22,0.2)]'}`}>
                                                <h4 className="text-[10px] font-black uppercase mb-1 opacity-50">Comportamento</h4>
                                                <p className="text-sm font-medium text-slate-300 leading-snug">{selected.flex}</p>
                                            </section>
                                            <section className="bg-indigo-900/30 p-4 rounded-xl border-2 border-indigo-500/30">
                                                <h4 className="text-[10px] font-black text-indigo-400 uppercase mb-1">Dica da Profª Goretti</h4>
                                                <p className="text-lg font-black italic leading-tight text-indigo-100">"{selected.tip}"</p>
                                            </section>
                                            <section>
                                                <h4 className="text-[10px] font-black text-slate-500 uppercase mb-3">Exemplos do Bunker</h4>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {selected.examples.map((ex, i) => (
                                                        <div key={i} className="px-3 py-2 bg-black/40 border border-slate-800 text-indigo-300 rounded-xl text-center text-xs font-black shadow-inner">{ex}</div>
                                                    ))}
                                                </div>
                                            </section>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="h-full min-h-[500px] flex flex-col items-center justify-center text-center p-12 bg-slate-900/60 rounded-[4rem] border-4 border-dashed border-slate-800">
                                        <div className="mb-8 animate-float">
                                            <Icons.Star />
                                        </div>
                                        <h3 className="text-3xl font-black text-white uppercase tracking-tighter leading-none">Aguardando <br/> Módulo Tático</h3>
                                        <p className="text-slate-500 font-bold text-sm mt-6 uppercase tracking-widest leading-none">Toque numa classe para ouvir a melodia.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                        <footer className="mt-20 py-10 border-t-2 border-slate-800 text-center">
                            <p className="text-xs font-black uppercase tracking-[0.8em] text-slate-600">Criado pela Profª Goretti • Versão Olímpica</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
